<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Arcane Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>
  <script src="phaser.min.js"></script>
  <script>
    (function () {
      var supportsModules = true;
      try { new Function("import('data:text/javascript,')"); } catch (e) { supportsModules = false; }
      if (supportsModules) {
        var script = document.createElement('script');
        script.type = 'module';
        script.src = 'main.js';
        document.body.appendChild(script);
      } else {
        document.getElementById('game-container').innerText =
          'This preview browser cannot run ES modules. Use a modern browser or desktop preview.';
      }
    }());
  </script>
</body>
</html>
